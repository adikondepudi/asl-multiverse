# =============================================================================
# V6 BASELINE SPATIAL ASL NETWORK
# =============================================================================
# Fixes from V5:
#   1. L1 loss (reverted from NLL to avoid cowardice / variance inflation)
#   2. variance_weight: 0.5 (stronger anti-collapse penalty)
#   3. 5 PLDs [500..2500] matching in-vivo protocol (no zero-padding)
#   4. Expanded CBF range (GM 10-200) to eliminate boundary bias
#   5. Expanded ATT range (GM 500-3000) for better high-ATT coverage
#
# SPEED OPTIMIZED for experimental runs:
#   - n_ensembles: 1 (not 3) — 3x faster per epoch
#   - batch_size: 64 — better A100 utilization
#   - torch.compile enabled — 20-30% speedup
#   - 30 epochs with patience 10
# =============================================================================

training:
  model_class_name: "SpatialASLNet"

  # Loss: L1 (reverted from NLL — NLL lets network inflate log_var to avoid
  # high-CBF predictions instead of being accurate)
  loss_type: "l1"
  att_scale: 1.0
  cbf_weight: 1.0
  att_weight: 1.0
  dc_weight: 0.0
  variance_weight: 0.5  # Increased from 0.1 for stronger anti-collapse

  # Training parameters — SPEED OPTIMIZED
  learning_rate: 0.001
  n_ensembles: 1
  n_epochs: 30
  batch_size: 64
  early_stopping_patience: 10

  # U-Net feature dimensions
  hidden_sizes: [32, 64, 128, 256]

  # Performance optimizations
  use_amp: true
  use_tf32: true
  use_compile: true
  cudnn_benchmark: true
  num_workers: 8
  pin_memory: true
  validation_steps_per_epoch: 20

data:
  use_offline_dataset: true
  offline_dataset_path: asl_spatial_dataset_v6
  pld_values: [500, 1000, 1500, 2000, 2500]  # 5 PLDs matching in-vivo protocol

  noise_type: "rician"
  data_noise_components:
    - thermal
    - physio
    - drift

  normalization_mode: "global_scale"
  global_scale_factor: 10.0

simulation:
  T1_artery: 1650.0
  T_tau: 1800.0
  alpha_PCASL: 0.85
  alpha_VSASL: 0.56
  alpha_BS1: 1.0

  domain_randomization:
    enabled: true
    T1_artery_range: [1550.0, 2150.0]
    alpha_PCASL_range: [0.75, 0.95]
    alpha_VSASL_range: [0.40, 0.70]
    alpha_BS1_range: [0.85, 1.0]
    T_tau_perturb: 0.10

noise_config:
  snr_range: [2.0, 25.0]
  spatial_noise_sigma: 0.8
  physio_amp_range: [0.03, 0.15]
  physio_freq_range: [0.5, 2.0]
  drift_range: [-0.03, 0.03]
  motion_probability: 0.15
  motion_shift_range: [1, 3]
  motion_rotate_range: [-2, 2]

_experiment:
  name: v6_baseline_spatial
  description: |
    SpatialASLNet with V6 fixes: L1 loss (reverted from NLL), stronger
    variance penalty (0.5), 5 PLDs matching in-vivo, expanded CBF/ATT ranges.
    Speed-optimized: 1 ensemble, batch 64, torch.compile.
