# =============================================================================
# V7 AMPLITUDE-AWARE SPATIAL ASL NETWORK
# =============================================================================
# Changes from V6:
#   1. 3 ensembles (was 1) — publication-grade uncertainty
#   2. 50 epochs (was 40) — more training with patience 15
#   3. variance_weight: 0.0 (was 0.5) — V6 showed it's not needed
#   4. learning_rate: 0.001 (was 0.0001) — bumped up since we have more epochs
#   5. 24h SLURM time limit (was 5h — too short for 3 ensembles)
#   6. Reuses V6 training data (asl_spatial_dataset_v6)
# =============================================================================

training:
  model_class_name: "AmplitudeAwareSpatialASLNet"

  # Network capacity
  hidden_sizes: [32, 64, 128, 256]
  dropout_rate: 0.1
  norm_type: group

  # Amplitude-aware features
  use_film_at_bottleneck: true
  use_film_at_decoder: true
  use_amplitude_output_modulation: true

  # Loss: L1 (proven in V6)
  loss_type: "l1"
  att_scale: 1.0
  cbf_weight: 1.0
  att_weight: 1.0
  dc_weight: 0.0
  variance_weight: 0.0

  # Training parameters — PUBLICATION GRADE
  learning_rate: 0.001
  weight_decay: 0.0001
  n_ensembles: 3
  n_epochs: 50
  batch_size: 64
  early_stopping_patience: 15

  # Performance optimizations
  use_amp: true
  use_tf32: true
  use_compile: true
  cudnn_benchmark: true
  num_workers: 8
  pin_memory: true
  validation_steps_per_epoch: 20

data:
  use_offline_dataset: true
  offline_dataset_path: asl_spatial_dataset_v6
  pld_values: [500, 1000, 1500, 2000, 2500]

  noise_type: "rician"
  data_noise_components:
    - thermal
    - physio
    - drift

  normalization_mode: "global_scale"
  global_scale_factor: 10.0

simulation:
  T1_artery: 1650.0
  T_tau: 1800.0
  alpha_PCASL: 0.85
  alpha_VSASL: 0.56
  alpha_BS1: 1.0

  domain_randomization:
    enabled: true
    T1_artery_range: [1550.0, 2150.0]
    alpha_PCASL_range: [0.75, 0.95]
    alpha_VSASL_range: [0.40, 0.70]
    alpha_BS1_range: [0.85, 1.0]
    T_tau_perturb: 0.10

noise_config:
  snr_range: [2.0, 25.0]
  spatial_noise_sigma: 0.8
  physio_amp_range: [0.03, 0.15]
  physio_freq_range: [0.5, 2.0]
  drift_range: [-0.03, 0.03]
  spike_probability: 0.02
  spike_magnitude_range: [2.0, 5.0]

_experiment:
  name: v7_amplitude_aware
  description: |
    V7 AmplitudeAwareSpatialASLNet: 3 ensembles, 50 epochs for publication.
    Reuses V6 training data. 24h SLURM time limit. LR bumped to 0.001.
