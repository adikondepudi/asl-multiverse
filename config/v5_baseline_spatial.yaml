# =============================================================================
# V5 BASELINE SPATIAL ASL NETWORK
# =============================================================================
# Baseline SpatialASLNet retrained on expanded-range data (asl_spatial_dataset_v5).
#
# Key changes from v4:
#   - offline_dataset_path: asl_spatial_dataset_v5 (expanded CBF/ATT ranges)
#   - global_scale_factor: 10.0 (fixed from v4's 1.0 mismatch)
#   - Training data: GM CBF 30-90, ATT 500-2500; WM CBF 10-40, ATT 800-3000
# =============================================================================

training:
  model_class_name: "SpatialASLNet"

  # Loss configuration
  loss_type: "l1"
  att_scale: 1.0
  cbf_weight: 1.0
  att_weight: 1.0
  dc_weight: 0.0
  variance_weight: 0.1

  # Training parameters
  learning_rate: 0.001
  n_ensembles: 3
  n_epochs: 50
  batch_size: 16
  early_stopping_patience: 15

  # U-Net feature dimensions (maps to ResearchConfig.hidden_sizes)
  hidden_sizes: [32, 64, 128, 256]

data:
  use_offline_dataset: true
  offline_dataset_path: asl_spatial_dataset_v5
  pld_values: [500, 1000, 1500, 2000, 2500, 3000]

  noise_type: "rician"
  data_noise_components: ["thermal"]

  normalization_mode: "global_scale"
  global_scale_factor: 10.0

simulation:
  T1_artery: 1650.0
  T_tau: 1800.0
  alpha_PCASL: 0.85
  alpha_VSASL: 0.56

  domain_randomization:
    enabled: true
    T1_artery_range: [1550.0, 2150.0]
    alpha_PCASL_range: [0.75, 0.95]
    alpha_VSASL_range: [0.40, 0.70]
    alpha_BS1_range: [0.85, 1.0]
    T_tau_perturb: 0.10

noise_config:
  snr_range: [5, 30]
  spatial_noise_sigma: 0.8
  motion_probability: 0.15
  motion_shift_range: [1, 3]
  motion_rotate_range: [-2, 2]

_experiment:
  name: v5_baseline_spatial
  description: |
    Baseline SpatialASLNet retrained on expanded-range training data.
    GM CBF 30-90, ATT 500-2500; WM CBF 10-40, ATT 800-3000.
    global_scale_factor = 10.0 (fixed from v4 mismatch).
