# =============================================================================
# IN-VIVO EXPERIMENT CONFIG (for Ralph Loop iteration on real patient data)
# =============================================================================
# This config controls both model architecture and training for in-vivo
# comparison. The test harness (invivo_comparison.py) reads this config.
# Modify this file to change training behavior between iterations.
# =============================================================================

training:
  model_class_name: AmplitudeAwareSpatialASLNet

  # Network capacity
  hidden_sizes: [32, 64, 128, 256]
  dropout_rate: 0.1
  norm_type: group

  # Amplitude-aware features — disable FiLM (global conditioning sensitive to tissue mix)
  # Keep per-pixel output modulation for local amplitude recovery
  use_film_at_bottleneck: false
  use_film_at_decoder: false
  use_amplitude_output_modulation: true

  # Loss configuration
  loss_type: l1
  dc_weight: 0.0
  variance_weight: 0.01
  att_scale: 1.0
  cbf_weight: 1.0
  att_weight: 1.0

  # Training parameters
  learning_rate: 0.003
  weight_decay: 0.0001
  batch_size: 64

data:
  pld_values: [500, 1000, 1500, 2000, 2500]
  normalization_mode: global_scale
  global_scale_factor: 10.0
  noise_type: gaussian
  data_noise_components:
    - thermal

noise_config:
  snr_range: [2.0, 25.0]

simulation:
  T1_artery: 1650.0
  T_tau: 1800.0
  alpha_PCASL: 0.85
  alpha_VSASL: 0.56
  T2_factor: 1.0
  alpha_BS1: 1.0

  domain_randomization:
    enabled: true
    T1_artery_range: [1550.0, 2150.0]
    alpha_PCASL_range: [0.75, 0.95]
    alpha_VSASL_range: [0.40, 0.70]
    alpha_BS1_range: [0.85, 1.0]
    T_tau_perturb: 0.10

_experiment:
  name: invivo_experiment
  description: |
    In-vivo comparison config. Trains model, runs on real patient data,
    compares to cached LS results. Goal: beat LS on CoV and smoothness
    while maintaining physiological plausibility.
