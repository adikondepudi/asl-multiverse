# =============================================================================
# V4 AMPLITUDE-AWARE SPATIAL ASL NETWORK
# =============================================================================
# AmplitudeAwareSpatialASLNet retrained on SIB-corrected data (asl_spatial_dataset_v4).
#
# Key changes from amplitude_aware_spatial.yaml:
#   - offline_dataset_path: asl_spatial_dataset_v4 (constant SIB, T1_artery=1650)
#   - n_ensembles: 3 (down from 5 to save time)
#   - n_epochs: 100 (down from 200)
#   - dc_weight: 0.0 (physics loss disabled)
# =============================================================================

training:
  model_class_name: AmplitudeAwareSpatialASLNet

  # Network capacity
  hidden_sizes: [32, 64, 128, 256]
  dropout_rate: 0.1
  norm_type: group

  # Amplitude-aware features
  use_film_at_bottleneck: true
  use_film_at_decoder: true
  use_amplitude_output_modulation: true

  # Loss configuration
  loss_type: l1
  dc_weight: 0.0
  variance_weight: 0.1
  att_scale: 1.0
  cbf_weight: 1.0
  att_weight: 1.0

  # Uncertainty bounds
  log_var_cbf_min: -5.0
  log_var_cbf_max: 10.0
  log_var_att_min: -5.0
  log_var_att_max: 14.0

  # Training parameters
  learning_rate: 0.0001
  weight_decay: 0.0001
  batch_size: 32
  n_epochs: 100
  n_ensembles: 3

  # Performance optimizations
  use_amp: true
  use_tf32: true
  use_compile: false
  cudnn_benchmark: true
  num_workers: 8
  pin_memory: true

  # Early stopping
  early_stopping_patience: 25
  early_stopping_min_delta: 0.0
  validation_steps_per_epoch: 50

data:
  use_offline_dataset: true
  offline_dataset_path: asl_spatial_dataset_v4
  pld_values: [500, 1000, 1500, 2000, 2500, 3000]

  normalization_mode: global_scale
  global_scale_factor: 10.0

  noise_type: rician
  data_noise_components:
    - thermal
    - physio
    - drift

noise_config:
  snr_range: [2.0, 25.0]
  physio_amp_range: [0.03, 0.15]
  physio_freq_range: [0.5, 2.0]
  drift_range: [-0.03, 0.03]
  spike_probability: 0.02
  spike_magnitude_range: [2.0, 5.0]

simulation:
  T1_artery: 1650.0
  T_tau: 1800.0
  alpha_PCASL: 0.85
  alpha_VSASL: 0.56
  T2_factor: 1.0
  alpha_BS1: 1.0

  domain_randomization:
    enabled: true
    T1_artery_range: [1550.0, 2150.0]
    alpha_PCASL_range: [0.75, 0.95]
    alpha_VSASL_range: [0.40, 0.70]
    T_tau_perturb: 0.10

_experiment:
  name: v4_amplitude_aware
  description: |
    AmplitudeAwareSpatialASLNet retrained on SIB-corrected training data.
    Uses constant SIB = 1 - exp(-T_sat/T1) instead of ATT-dependent formula.
    T1_artery = 1650 ms (3T consensus), att_scale = 1.0, dc_weight = 0.0.
