# V3 Experiment 1: All Bugs Fixed (SpatialASLNet)
# Tests: Does fixing T1 + att_scale + domain randomization fix the CBF bias?
training:
  model_class_name: SpatialASLNet
  hidden_sizes: [32, 64, 128, 256]
  dropout_rate: 0.1
  norm_type: group
  loss_type: l1
  dc_weight: 0.0
  variance_weight: 0.1
  att_scale: 1.0
  cbf_weight: 1.0
  att_weight: 1.0
  log_var_cbf_min: -5.0
  log_var_cbf_max: 10.0
  log_var_att_min: -5.0
  log_var_att_max: 14.0
  learning_rate: 0.0001
  weight_decay: 0.0001
  batch_size: 64
  n_epochs: 100
  n_ensembles: 3
  early_stopping_patience: 20
  early_stopping_min_delta: 0.0
  validation_steps_per_epoch: 50
  use_amp: true
  use_tf32: true
  use_compile: true
  cudnn_benchmark: true
  num_workers: 8
  pin_memory: true

data:
  use_offline_dataset: true
  offline_dataset_path: v3_spatial_dataset
  num_samples_to_load: 100000
  pld_values: [500, 1000, 1500, 2000, 2500, 3000]
  normalization_mode: global_scale
  global_scale_factor: 10.0
  noise_type: rician
  data_noise_components:
    - thermal
    - physio
    - drift

noise_config:
  snr_range: [2.0, 25.0]
  physio_amp_range: [0.03, 0.15]
  physio_freq_range: [0.5, 2.0]
  drift_range: [-0.03, 0.03]
  spike_probability: 0.02
  spike_magnitude_range: [2.0, 5.0]

simulation:
  T1_artery: 1650.0
  T_tau: 1800.0
  alpha_PCASL: 0.85
  alpha_VSASL: 0.56
  T2_factor: 1.0
  alpha_BS1: 1.0
  domain_randomization:
    enabled: true
    T1_artery_range: [1550.0, 2150.0]
    alpha_PCASL_range: [0.75, 0.95]
    alpha_VSASL_range: [0.40, 0.70]
    alpha_BS1_range: [0.85, 1.0]
    T_tau_perturb: 0.10

wandb:
  wandb_project: asl-v3-fundamental
  wandb_entity: adikondepudi
