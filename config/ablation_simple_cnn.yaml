# Ablation: SimpleCNN baseline (no U-Net skip connections, no multi-scale)
# Tests whether U-Net architecture is necessary or simple spatial context suffices.
#
# Hypothesis: If SimpleCNN ~ SpatialASLNet, spatial context alone drives performance.
#             If SpatialASLNet >> SimpleCNN, multi-scale features from U-Net matter.

training:
  model_class_name: "SimpleCNN"
  hidden_sizes: [32, 64]  # Uses first two values as hidden channel dims

  # Same loss config as baseline SpatialASLNet
  loss_type: "l1"
  att_scale: 1.0
  cbf_weight: 1.0
  att_weight: 1.0
  dc_weight: 0.0
  variance_weight: 0.1

  learning_rate: 0.001
  n_ensembles: 3
  training_epochs: 50
  batch_size: 16
  early_stopping_patience: 15

data:
  dataset_path: "asl_spatial_dataset_100k"
  pld_values: [500, 1000, 1500, 2000, 2500, 3000]
  noise_type: "rician"
  data_noise_components: ["thermal"]
  normalization_mode: "global_scale"
  global_scale_factor: 1.0

simulation:
  T1_artery: 1650.0
  T_tau: 1800.0
  alpha_PCASL: 0.85
  alpha_VSASL: 0.56
  domain_randomization:
    enabled: true
    T1_artery_range: [1550.0, 2150.0]
    alpha_PCASL_range: [0.75, 0.95]
    alpha_VSASL_range: [0.40, 0.70]
    alpha_BS1_range: [0.85, 1.0]
    T_tau_perturb: 0.10

noise_config:
  snr_range: [5, 30]

_experiment:
  name: ablation_simple_cnn
  description: 3-layer CNN without U-Net to test if multi-scale features matter
  hypothesis: If SimpleCNN matches U-Net, spatial context alone drives gains over voxel-wise
