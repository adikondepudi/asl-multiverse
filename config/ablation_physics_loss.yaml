# Ablation: Physics (data consistency) loss weight sweep
# Tests whether physics-informed loss adds value to spatial models.
#
# dc_weight=0: No physics constraint (current production default)
# dc_weight>0: Reconstructed signal must match input via kinetic model
#
# CLAUDE.md says "ablation showed minimal benefit" but this was tested
# only in v1 with a broken training pipeline. Worth re-testing.
#
# Sweep: dc_weight = [0.0, 0.001, 0.01, 0.1, 0.3]
# Note: Raw DC loss is ~1000x larger than supervised loss, so even 0.1 is strong.

training:
  model_class_name: "SpatialASLNet"
  hidden_sizes: [32, 64, 128, 256]

  loss_type: "l1"
  att_scale: 1.0
  cbf_weight: 1.0
  att_weight: 1.0
  dc_weight: 0.0          # SWEEP: [0.0, 0.001, 0.01, 0.1, 0.3]
  variance_weight: 0.1

  learning_rate: 0.001
  n_ensembles: 3
  training_epochs: 50
  batch_size: 16
  early_stopping_patience: 15

data:
  dataset_path: "asl_spatial_dataset_100k"
  pld_values: [500, 1000, 1500, 2000, 2500, 3000]
  noise_type: "rician"
  data_noise_components: ["thermal"]
  normalization_mode: "global_scale"
  global_scale_factor: 1.0

simulation:
  T1_artery: 1650.0
  T_tau: 1800.0
  alpha_PCASL: 0.85
  alpha_VSASL: 0.56
  domain_randomization:
    enabled: true
    T1_artery_range: [1550.0, 2150.0]
    alpha_PCASL_range: [0.75, 0.95]
    alpha_VSASL_range: [0.40, 0.70]
    alpha_BS1_range: [0.85, 1.0]
    T_tau_perturb: 0.10

noise_config:
  snr_range: [5, 30]

_experiment:
  name: ablation_physics_loss
  description: Sweep dc_weight to test if physics-informed loss helps spatial models
  hypothesis: Small dc_weight (0.001-0.01) may help as regularizer; large values hurt
