# =============================================================================
# V4 BASELINE SPATIAL ASL NETWORK
# =============================================================================
# Baseline SpatialASLNet retrained on SIB-corrected data (asl_spatial_dataset_v4).
#
# Key changes from spatial_mae_loss.yaml:
#   - offline_dataset_path: asl_spatial_dataset_v4 (constant SIB, T1_artery=1650)
#   - att_scale: 1.0 (corrected from legacy 0.033)
#   - dc_weight: 0.0 (physics loss disabled — ablation showed minimal benefit)
#   - n_ensembles: 3
#   - training_epochs: 50
# =============================================================================

training:
  model_class_name: "SpatialASLNet"

  # Loss configuration
  loss_type: "l1"
  att_scale: 1.0
  cbf_weight: 1.0
  att_weight: 1.0
  dc_weight: 0.0
  variance_weight: 0.1

  # Training parameters
  learning_rate: 0.001
  n_ensembles: 3
  training_epochs: 50
  batch_size: 16
  early_stopping_patience: 15

  # U-Net feature dimensions
  features: [32, 64, 128, 256]

data:
  use_offline_dataset: true
  offline_dataset_path: asl_spatial_dataset_v4
  pld_values: [500, 1000, 1500, 2000, 2500, 3000]

  noise_type: "rician"
  data_noise_components: ["thermal"]

  normalization_mode: "global_scale"
  global_scale_factor: 1.0

simulation:
  T1_artery: 1650.0
  T_tau: 1800.0
  alpha_PCASL: 0.85
  alpha_VSASL: 0.56

  domain_randomization:
    enabled: true
    T1_artery_range: [1550.0, 2150.0]
    alpha_PCASL_range: [0.75, 0.95]
    alpha_VSASL_range: [0.40, 0.70]
    alpha_BS1_range: [0.85, 1.0]
    T_tau_perturb: 0.10

noise_config:
  snr_range: [5, 30]
  spatial_noise_sigma: 0.8
  motion_probability: 0.15
  motion_shift_range: [1, 3]
  motion_rotate_range: [-2, 2]

_experiment:
  name: v4_baseline_spatial
  description: |
    Baseline SpatialASLNet retrained on SIB-corrected training data.
    Uses constant SIB = 1 - exp(-T_sat/T1) instead of ATT-dependent formula.
    T1_artery = 1650 ms (3T consensus), att_scale = 1.0.
