# =============================================================================
# PRODUCTION MODEL CONFIGURATION v2 (CORRECTED)
# =============================================================================
# Based on production_v1 with THREE CRITICAL FIXES for in-vivo performance:
#
#   FIX 1: alpha_BS1_range added to domain randomization [0.85, 1.0]
#          - Production v1 OMITTED this, causing 25% PCASL / 20% VSASL
#            signal mismatch with in-vivo data that uses background suppression
#
#   FIX 2: T1_artery corrected from 1850.0 to 1650.0 ms
#          - 1650 ms is the ASL consensus value at 3T (Alsop 2015)
#          - 1850 ms was a legacy value that introduces 5-15% signal error
#
#   FIX 3: att_scale corrected from 0.033 to 1.0
#          - With z-score normalized spatial targets, att_scale should be 1.0
#          - 0.033 was a legacy value from unnormalized voxel-wise training
#          - This fix increases ATT loss weight from 3.3% to 100% of CBF weight
#
# Expected impact: These three config-only fixes should substantially reduce
# the observed +20-27 ml/100g/min CBF bias on in-vivo data.
#
# Date: February 8, 2026
# =============================================================================

# --- MODEL ARCHITECTURE ---
training:
  model_class_name: SpatialASLNet      # U-Net architecture (proven winner)

  # Network capacity
  hidden_sizes: [32, 64, 128, 256]     # Standard U-Net pyramid
  dropout_rate: 0.1                     # Regularization
  norm_type: group                      # GroupNorm (no train/eval mismatch)

  # Loss configuration - CRITICAL SETTINGS
  loss_type: l1                         # MAE loss (forces accurate predictions)
  dc_weight: 0.0                        # NO physics constraint (hurts performance)
  variance_weight: 0.1                  # Prevents mean-collapse

  # Target scaling
  # FIX 3: att_scale corrected from 0.033 to 1.0
  # With z-score normalized spatial targets, both CBF and ATT are in units
  # of standard deviations from their respective means. No rescaling needed.
  att_scale: 1.0                        # FIXED (was 0.033 in v1)
  cbf_weight: 1.0
  att_weight: 1.0

  # Uncertainty bounds
  log_var_cbf_min: -5.0
  log_var_cbf_max: 10.0
  log_var_att_min: -5.0
  log_var_att_max: 14.0

  # Training parameters
  learning_rate: 0.0001                 # Adam default
  weight_decay: 0.0001                  # L2 regularization
  batch_size: 64                        # Increased for A100 (40-80GB VRAM)
  n_epochs: 200                         # Extended training
  n_ensembles: 5                        # 5-model ensemble for robustness

  # A100 Performance Optimizations
  use_amp: true                         # Mixed precision (FP16)
  use_tf32: true                        # TF32 tensor cores (A100 specific)
  use_compile: true                     # torch.compile (PyTorch 2.0+)
  cudnn_benchmark: true                 # Auto-tune convolution algorithms
  num_workers: 8                        # Parallel data loading
  pin_memory: true                      # Faster CPU->GPU transfers

  # Early stopping
  early_stopping_patience: 25           # More patience for production
  early_stopping_min_delta: 0.0
  validation_steps_per_epoch: 50        # More validation samples

# --- DATA CONFIGURATION ---
data:
  use_offline_dataset: true
  offline_dataset_path: asl_spatial_dataset_200k    # Production dataset
  num_samples_to_load: 200000                       # 200k samples

  # PLD values (ms) - standard MULTIVERSE protocol
  pld_values: [500, 1000, 1500, 2000, 2500, 3000]

  # CRITICAL: Normalization mode
  # global_scale preserves CBF amplitude information
  # per_curve (z-score) DESTROYS CBF information - DO NOT USE
  normalization_mode: global_scale
  global_scale_factor: 10.0

  # Noise model
  noise_type: rician                    # MRI-correct magnitude noise

  # Active noise components for realistic training
  data_noise_components:
    - thermal                           # Scanner thermal noise
    - physio                            # Physiological oscillations
    - drift                             # Scanner drift

# --- NOISE ENGINE CONFIGURATION ---
noise_config:
  # Wide SNR range for robustness to clinical variability
  snr_range: [2.0, 25.0]                # Covers pathology (low) to optimal (high)

  # Physiological noise (cardiac/respiratory)
  physio_amp_range: [0.03, 0.15]        # 3-15% amplitude
  physio_freq_range: [0.5, 2.0]         # 0.5-2 Hz (cardiac/resp)

  # Scanner drift
  drift_range: [-0.03, 0.03]            # +-3% drift

  # Motion spikes (occasional artifacts)
  spike_probability: 0.02               # 2% chance per sample
  spike_magnitude_range: [2.0, 5.0]     # 2-5x signal

# --- PHYSICS PARAMETERS ---
simulation:
  # FIX 2: T1_artery corrected from 1850.0 to 1650.0
  # 1650 ms is the 3T consensus value (Alsop et al. 2015)
  T1_artery: 1650.0                     # FIXED (was 1850.0 in v1)
  T_tau: 1800.0                         # Label duration (ms)
  alpha_PCASL: 0.85                     # PCASL labeling efficiency
  alpha_VSASL: 0.56                     # VSASL labeling efficiency
  T2_factor: 1.0                        # T2 decay factor
  alpha_BS1: 1.0                        # Background suppression (base value)

  # Domain randomization for generalization
  domain_randomization:
    enabled: true
    T1_artery_range: [1550.0, 2150.0]   # Hematocrit variation
    alpha_PCASL_range: [0.75, 0.95]     # Labeling efficiency variation
    alpha_VSASL_range: [0.40, 0.70]     # VSS efficiency variation
    T_tau_perturb: 0.10                  # +-10% label duration

    # FIX 1: alpha_BS1_range ADDED (was missing entirely in v1)
    # Background suppression: in-vivo Philips data uses ~0.93 per-pulse
    # PCASL effective alpha = alpha_PCASL * alpha_BS1^4
    # VSASL effective alpha = alpha_VSASL * alpha_BS1^3
    # At alpha_BS1=0.93: PCASL is reduced by 25%, VSASL by 20%
    # Without this, models never see BS-attenuated signals during training
    alpha_BS1_range: [0.85, 1.0]         # FIXED (was missing in v1)

# --- LOGGING ---
wandb:
  wandb_project: asl-production-v2
  wandb_entity: adikondepudi

# --- METADATA ---
_experiment:
  name: production_v2_corrected
  description: >
    Production v1 with three critical fixes for in-vivo performance:
    (1) alpha_BS1_range added to domain randomization,
    (2) T1_artery corrected to 1650 ms consensus,
    (3) att_scale corrected to 1.0 for normalized targets.
  hypothesis: >
    The observed +20-27 ml/100g/min CBF bias on in-vivo data is primarily
    caused by missing BS modeling (25% signal mismatch) and T1_artery error.
    These config-only fixes should substantially reduce in-vivo CBF bias.
  changes_from_v1:
    - "simulation.T1_artery: 1850.0 -> 1650.0"
    - "training.att_scale: 0.033 -> 1.0"
    - "simulation.domain_randomization.alpha_BS1_range: ADDED [0.85, 1.0]"
