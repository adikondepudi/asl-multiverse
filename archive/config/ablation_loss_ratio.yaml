# Ablation: CBF:ATT loss ratio sweep
# Tests how different CBF/ATT loss weightings affect parameter estimation.
#
# Default is 1:1 ratio. With normalized targets (z-scores), both are same scale.
# But CBF might benefit from higher weight since it's harder to estimate.
#
# Sweep: cbf_weight = [0.5, 1.0, 2.0, 5.0], att_weight = 1.0 (fixed)
# Run with: --override training.cbf_weight=X

training:
  model_class_name: "SpatialASLNet"
  hidden_sizes: [32, 64, 128, 256]

  loss_type: "l1"
  att_scale: 1.0
  cbf_weight: 1.0        # SWEEP: [0.5, 1.0, 2.0, 5.0]
  att_weight: 1.0         # Fixed
  dc_weight: 0.0
  variance_weight: 0.1

  learning_rate: 0.001
  n_ensembles: 3
  training_epochs: 50
  batch_size: 16
  early_stopping_patience: 15

data:
  dataset_path: "asl_spatial_dataset_100k"
  pld_values: [500, 1000, 1500, 2000, 2500, 3000]
  noise_type: "rician"
  data_noise_components: ["thermal"]
  normalization_mode: "global_scale"
  global_scale_factor: 1.0

simulation:
  T1_artery: 1650.0
  T_tau: 1800.0
  alpha_PCASL: 0.85
  alpha_VSASL: 0.56
  domain_randomization:
    enabled: true
    T1_artery_range: [1550.0, 2150.0]
    alpha_PCASL_range: [0.75, 0.95]
    alpha_VSASL_range: [0.40, 0.70]
    alpha_BS1_range: [0.85, 1.0]
    T_tau_perturb: 0.10

noise_config:
  snr_range: [5, 30]

_experiment:
  name: ablation_loss_ratio
  description: Sweep CBF:ATT loss ratio to find optimal balance
  hypothesis: Higher CBF weight may help since CBF is harder to estimate
